<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Shelly Status</title>
    <meta name="theme-color" content="#0f1419" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Shelly Status" />
    <meta name="mobile-web-app-capable" content="yes" />
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="icon" href="icons/icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="icons/icon.svg" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="page-glow page-glow-left" aria-hidden="true"></div>
    <div class="page-glow page-glow-right" aria-hidden="true"></div>
    <main class="wrap">
      <section class="toolbar-panel">
        <form class="row" id="form" action="#" method="get">
          <button type="button" id="btnConnect" class="primary-action">Start</button>
        </form>

        <div class="message-stack">
          <p class="note" id="note" hidden></p>
          <p class="err" id="err" hidden></p>
        </div>
      </section>

      <section class="metrics-grid">
      <section class="power-display power-card power-card-grid" aria-live="polite">
        <div class="card-topline">
          <span class="card-kicker">Shelly 192.168.178.52</span>
          <span class="card-dot"></span>
        </div>
        <h2>Netzbezug</h2>
        <div class="power-value">
          <span id="powerValue">— —</span>
          <span class="power-unit">W</span>
        </div>
      </section>

      <section class="power-display power-card power-card-solar" aria-live="polite">
        <div class="card-topline">
          <span class="card-kicker">Shelly 192.168.178.53</span>
          <span class="card-dot"></span>
        </div>
        <h2>Solar</h2>
        <div class="power-value">
          <span id="powerValue2">— —</span>
          <span class="power-unit">W</span>
        </div>
      </section>

      <section class="power-display power-card power-card-load" aria-live="polite">
        <div class="card-topline">
          <span class="card-kicker">Berechnet live</span>
          <span class="card-dot"></span>
        </div>
        <h2>Verbrauch</h2>
        <div class="power-value">
          <span id="powerValue3">— —</span>
          <span class="power-unit">W</span>
        </div>
      </section>
      </section>

      <section class="chart-panel" aria-live="polite">
        <div class="chart-head">
          <div>
            <p class="eyebrow chart-eyebrow">History</p>
            <h2>Verlauf letzte 120 Sekunden</h2>
          </div>
        </div>
        <div class="chart-legend" aria-hidden="true">
          <span class="legend-item"><span class="legend-swatch legend-swatch-load"></span>Verbrauch <span class="legend-value" id="legendLoadValue">-- W</span></span>
          <span class="legend-item"><span class="legend-swatch legend-swatch-grid"></span>Netzbezug <span class="legend-value" id="legendGridValue">-- W</span></span>
          <span class="legend-item"><span class="legend-swatch legend-swatch-solar"></span>Solar <span class="legend-value" id="legendSolarValue">-- W</span></span>
        </div>
        <canvas id="powerChart" height="260"></canvas>
      </section>
    </main>
    <script src="app.js" defer></script>
  </body>
</html>
